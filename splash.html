<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  background: #1e1e2f;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-family: sans-serif;
}
.loader {
  text-align: center;
}
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #444;
  border-top: 4px solid #4f8cff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}
@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Loading Aspire CRM...</p>
  </div>
</body>
</html>
